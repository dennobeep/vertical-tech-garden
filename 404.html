    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --green-900: #1b3a1b;
            --green-800: #1e4a1e;
            --green-700: #2d5e2d;
            --green-600: #3d7a3d;
            --green-500: #4caf50;
            --green-400: #6fbf73;
            --green-300: #81c784;
            --green-200: #a5d6a7;
            --green-100: #c8e6c9;
            --green-50: #e8f5e9;
            --cream: #faf9f6;
            --white: #ffffff;
            --gray-800: #2d3436;
            --gray-600: #636e72;
            --gray-400: #b2bec3;
            --font-primary: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-display: 'Playfair Display', Georgia, serif;
        }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--cream);
            font-family: var(--font-primary);
            color: var(--gray-800);
            text-align: center;
            padding: 40px 24px;
        }
        .code {
            font-family: var(--font-display);
            font-size: clamp(7rem, 18vw, 12rem);
            font-weight: 700;
            color: var(--green-500);
            line-height: 1;
            letter-spacing: -4px;
            position: relative;
        }
        .code::after {
            content: '';
            display: block;
            width: 80px;
            height: 3px;
            background: var(--green-300);
            margin: 8px auto 0;
            border-radius: 2px;
        }
        .leaf {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--green-600);
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }
        .leaf i { font-size: 1rem; }
        h1 {
            font-family: var(--font-display);
            font-size: clamp(1.5rem, 4vw, 2.2rem);
            color: var(--green-900);
            margin: 16px 0 12px;
        }
        p {
            font-size: 1rem;
            color: var(--gray-600);
            max-width: 440px;
            margin: 0 auto 32px;
            line-height: 1.6;
        }
        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 28px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .btn-primary {
            background: var(--green-600);
            color: var(--white);
        }
        .btn-primary:hover {
            background: var(--green-700);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(61, 122, 61, 0.3);
        }
        .btn-outline {
            border: 2px solid var(--green-200);
            color: var(--green-700);
            background: transparent;
        }
        .btn-outline:hover {
            border-color: var(--green-500);
            background: var(--green-50);
            transform: translateY(-2px);
        }
        .plants {
            display: flex;
            gap: 6px;
            margin-bottom: 24px;
            font-size: 1.4rem;
            color: var(--green-300);
        }
        .support {
            margin-top: 48px;
            padding-top: 24px;
            border-top: 1px solid var(--green-100);
            font-size: 0.82rem;
            color: var(--gray-400);
        }
        .support a {
            color: var(--green-700);
            text-decoration: none;
        }
        .support a:hover { text-decoration: underline; }

        @media (max-width: 480px) {
            body { padding: 24px 16px; }
            .code { font-size: clamp(5rem, 25vw, 7rem); letter-spacing: -2px; }
            .code::after { width: 56px; }
            h1 { font-size: 1.3rem; margin: 12px 0 10px; }
            p { font-size: 0.9rem; margin-bottom: 24px; }
            .actions { flex-direction: column; align-items: center; width: 100%; }
            .actions .btn { width: 100%; justify-content: center; padding: 12px 20px; }
            .plants { font-size: 1.1rem; margin-bottom: 16px; }
            .support { margin-top: 32px; padding-top: 16px; font-size: 0.78rem; }
        }
    </style>
</head>

</body>
